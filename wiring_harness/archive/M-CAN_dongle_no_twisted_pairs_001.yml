connectors:
  AVN_M05-B_F:
    type: AMP_020060_35F
    subtype: female
    pinlabels: [MIC_RH_(+), MIC_LH_(+), NC, NC, NC, ILL_(+), M-CAN_(HIGH)_1, NC, NC, PWR_12V_1, PWR_12V_2, GND, GND, MIC_RH_(-), MIC_LH_(-), NC, NC, NC, ILL_(-), M-CAN_(LOW)_1, NC, PWR_12V_3, PWR_4, PWR_5, NC, NC, NC, NC, NC, NC, NC, PWR_12V_6, PWR_12V_7, GND, GND]
    manufacturer: TE Connectivity
    mpn: 2188701
    image: 
      src: ./connector_imgs/M05-B_rear.png
      caption: view from rear of female connector
    additional_components:
      - type: Crimp
        subtype: 020 Terminal
        qty: 11
        manufacturer: TE Connectivity
        mpn: 2219299-1 
      - type: Crimp
        subtype: 060 Terminal, 0.3mm^2 wire
        qty: 4
        manufacturer: TE Connectivity
        mpn: 2109006-1 
      - type: Crimp
        subtype: 060 Terminal, 1.25mm^2 wire
        qty: 4
        manufacturer: TE Connectivity
        mpn: 2109006-3 

  AVN_M05-B_MALE_MATE:
    type: wire-to-wire equiv. of TE 2188692
    subtype: male 
    pinlabels: [MIC_RH_(+), MIC_LH_(+), NC, NC, NC, ILL_(+), M-CAN_(HIGH)_2, NC, NC, PWR_12V_1, PWR_12V_2, GND, GND, MIC_RH_(-), MIC_LH_(-), NC, NC, NC, ILL_(-), M-CAN_(LOW)_2, NC, PWR_12V_3, PWR_4, PWR_5, NC, NC, NC, NC, NC, NC, NC, PWR_12V_6, PWR_12V_7, GND, GND]
    additional_components:
      - type: Crimp
        subtype: 020 Terminal
        qty: 11
        manufacturer: TE Connectivity
        mpn: 2219299-1 
      - type: Crimp
        subtype: 060 Terminal, 0.3mm^2 wire
        qty: 4
        manufacturer: TE Connectivity
        mpn: 2109006-1 
      - type: Crimp
        subtype: 060 Terminal, 1.25mm^2 wire
        qty: 4
        manufacturer: TE Connectivity
        mpn: 2109006-3 

  OBD2:
    type: OBD2
    subtype: female
    pinlabels: [PWR_12V_7, NC, M-CAN_(HIGH)_1, NC, GND, NC, NC, NC, PWR_12V_1, NC, M-CAN_(LOW)_1, M-CAN_(LOW)_2, M-CAN_(HIGH)_2, NC, NC, NC]
    manufacturer: Molex
    mpn: 51115-1611
    image: 
      src: ./connector_imgs/OBD_rear.png
      caption: view from rear of female connector
    additional_components:
      - type: Crimp
        subtype: OBD2 Terminal
        qty: 7
        manufacturer: Molex
        mpn: 50420-8000 
      - type: Retainer
        subtype: OBD2 Retainer
        qty: 7
        manufacturer: Molex
        mpn: 51117-1605 

  switch:
    type: double pole single throw
    subtype: latching 5VDC
    manufacturer: Alcoswitch
    mpn: TSS21KGPC
    supplier: TE Connectivity
    spn: 1-1437579-6
    pinlabels: [M-CAN_(HIGH)_1, M-CAN_(LOW)_1, M-CAN_(HIGH)_2, M-CAN_(LOW)_2]
    image:
      src: ./connector_imgs/SPDT_switch.png
      caption: HIGH 1-HIGH 2 and LOW 1-LOW 2
    additional_components:
      - type: 5.08mm pitch wire-to-board receptacle
        subtype: DYNAMIC D-3500 REC HSG 2P
        qty: 2
        manufacturer: TE Connectivity
        mpn: 175362-2
      - type: Crimp
        subtype: 0.2-0.6mm^2 receptable contact
        qty: 4
        manufacturer: TE Connectivity
        mpn: 175195-2

  S11:
    # style: simple
    type: Splice
    pinlabels: [PWR_12V_2]

  S13:
    # style: simple
    type: Splice
    pinlabels: [GND]

  S33:
    # style: simple
    type: Splice
    pinlabels: [PWR_12V_7]

  S7:
    # style: simple
    type: " "
    ignore_in_bom: true
    pinlabels: [M-CAN_(HIGH)_2]

  S20:
    # style: simple
    type: " "
    ignore_in_bom: true
    pinlabels: [M-CAN_(LOW)_2]

  SMH1:
    type: Splice
    pinlabels: [M-CAN_(HIGH)_1]

  SMH2:
    type: Splice
    pinlabels: [M-CAN_(HIGH)_2]

  SML1:
    type: Splice
    pinlabels: [M-CAN_(LOW)_1]

  SML2:
    type: Splice
    pinlabels: [M-CAN_(LOW)_2]

tweak:
  override:
    S7:
      shape: point
    S20:
      shape: point
  append: |-
    subgraph clusterX{
      color=white
      S7
      S20
    }

