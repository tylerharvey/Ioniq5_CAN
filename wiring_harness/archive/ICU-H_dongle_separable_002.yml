# metadata:
  # name: Hyundai/Kia M-CAN to OBD dongle

connectors:
  ST1532_0p7_21TD:
    type: 32-pin
    subtype: female
    pinlabels: [NC, NC, NC, NC, NC, NC, HR, NC, NC, NC, NC, NC, NC, NC, NC, GND, E-CAN (HIGH), E-CAN (LOW), P-CAN (HIGH), P-CAN (LOW), C-CAN (HIGH), C-CAN (LOW), I-CAN (HIGH), I-CAN (LOW), D-CAN (HIGH), D-CAN (LOW), B-CAN (HIGH), B-CAN (LOW), G-CAN (HIGH), G-CAN (LOW), M-CAN (HIGH), M-CAN (LOW)]
    manufacturer: Star
    mpn: ST1532-0.7-21TD
    image: 
      src: ./connector_imgs/ICU-H_front.png
      caption: pinout from <b>front</b> (mating side) of female connector
    additional_components:
      - type: Crimp
        qty: 18
      #   subtype: 020 Terminal
      #   manufacturer: TE Connectivity
      #   mpn: 2219299-1 MALE MATE
      # - type: Crimp
      #   subtype: 060 Terminal, 0.3mm^2 wire
      #   qty: 4
      #   manufacturer: TE Connectivity
      #   mpn: 2109006-1 MALE MATE
      # - type: Crimp
      #   subtype: 060 Terminal, 1.25mm^2 wire
      #   qty: 4
      #   manufacturer: TE Connectivity
      #   mpn: 2109006-3 MALE MATE

  ST1532_0p7_11TD:
    type: 32-pin
    subtype: male
    pinlabels: [NC, NC, NC, NC, NC, NC, HR, NC, NC, NC, NC, NC, NC, NC, NC, GND, E-CAN (HIGH), E-CAN (LOW), P-CAN (HIGH), P-CAN (LOW), C-CAN (HIGH), C-CAN (LOW), I-CAN (HIGH), I-CAN (LOW), D-CAN (HIGH), D-CAN (LOW), B-CAN (HIGH), B-CAN (LOW), G-CAN (HIGH), G-CAN (LOW), M-CAN (HIGH), M-CAN (LOW)]
    manufacturer: Star
    mpn: ST1532-0.7-11TD
    additional_components:
      - type: Crimp
        qty: 18
      # - type: Crimp
      #   subtype: 020 Terminal
      #   qty: 11
      #   manufacturer: TE Connectivity
      #   mpn: 2219299-1 MALE MATE
      # - type: Crimp
      #   subtype: 060 Terminal, 0.3mm^2 wire

  OBD2:
    type: OBD2
    subtype: female
    pinlabels: [NC, NC, CAN (HIGH), GND, GND, CAN2 (HIGH), NC, NC, PWR_12V_1, NC, CAN (LOW), CAN3 (LOW), CAN3 (HIGH), CAN2 (LOW), NC, NC]
    manufacturer: Molex
    mpn: 51115-1611
    image: 
      src: ./connector_imgs/OBDII_front.png
      caption: view from <b>front</b> (mating side) of female connector
    additional_components:
      - type: Crimp
        subtype: OBD2 Terminal
        qty: 9
        manufacturer: Molex
        mpn: 50420-8000 
      - type: Retainer
        subtype: OBD2 Retainer
        qty: 9
        manufacturer: Molex
        mpn: 51117-1605 

  CAN_pair:
    type: 3-pin
    subtype: male
    manufacturer: Star
    mpn: ST1803-0.7-11
    pinlabels: [CAN (HIGH), NC, CAN (LOW)]
    additional_components:
      - type: Crimp
        qty: 2
      #   subtype: 0.2-0.35mm^2 receptacle contact
      #   manufacturer: TE Connectivity
      #   mpn: 17633-1

  CAN_selector:
    type: 3-pin
    subtype: female
    manufacturer: Star
    mpn: ST1803-0.7-21
    pinlabels: [CAN (HIGH), NC, CAN (LOW)]
    additional_components:
      - type: Crimp
        qty: 2

  CAN_selector2:
    type: 3-pin
    subtype: female
    manufacturer: Star
    mpn: ST1803-0.7-21
    pinlabels: [CAN2 (HIGH), NC, CAN2 (LOW)]
    additional_components:
      - type: Crimp
        qty: 2

  CAN_selector3:
    type: 3-pin
    subtype: female
    manufacturer: Star
    mpn: ST1803-0.7-21
    pinlabels: [CAN3 (HIGH), NC, CAN3 (LOW)]
    additional_components:
      - type: Crimp
        qty: 2

  GND_f:
    type: 1-pin
    subtype: female
    manufacturer: Star
    mpn: ST1501-1.5-21PG
    pinlabels: [GND]
    additional_components:
      - type: Crimp
        qty: 1

  GND_m:
    type: 1-pin
    subtype: male
    manufacturer: Star
    mpn: ST1501-1.5-11PG
    pinlabels: [GND]
    additional_components:
      - type: Crimp
        qty: 1

  Fuse_tap:
    type: fuse tap
    subtype: micro2
    manufacturer: Star
    mpn: ST304 Micro 2
    pinlabels: [PWR_12V_1]
    additional_components:
      - type: micro2 fuse
        subtype: 10A
        qty: 1

  SGND:
    # style: simple
    type: Splice
    pinlabels: [GND]


